<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>手機連線 QR</title></head>
<body style="text-align:center; margin-top:50px;">
<h2>📱 手機掃描 QR Code 測試地圖</h2>
<div id="qrcode"></div>
<p id="ip"></p>
<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
<script>
    fetch('https://api.ipify.org?format=json')
        .then(r => r.json())
        .then(data => {
            const url = `http://${data.ip}:8000`;
            document.getElementById('ip').innerText = url;
            new QRCode(document.getElementById("qrcode"), { text: url, width: 200, height: 200 });
        });
</script>
</body>
</html>
